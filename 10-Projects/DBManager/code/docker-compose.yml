services:
  core:
    build: ./docker/core
    volumes:
      - ./core:/app
    ports:
      - "8001:8000"
    environment:
      # DB_CONNECTION і DB_DATABASE задаються в core/.env (runtime) та core/phpunit.xml
      # (тести → окрема БД dbmanager_core_test). Тут лише хост і креди.
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: dbmanager_core
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "33061:3306"

  redis:
    image: redis:7-alpine

  bridge:
    build: ./docker/core
    volumes:
      - ./bridge:/app
    ports:
      - "8002:8000"
    environment:
      # DB_CONNECTION і DB_DATABASE задаються в bridge/.env (runtime) та bridge/phpunit.xml
      # (тести → окрема БД dbmanager_bridge_test). Тут лише хост і креди.
      DB_HOST: bridge-mysql
      DB_PORT: "3306"
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
    depends_on:
      - bridge-mysql
      - redis

  bridge-mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: dbmanager_bridge
    volumes:
      - bridge-mysql-data:/var/lib/mysql
    ports:
      - "33062:3306"

  plugin:
    build: ./docker/core
    volumes:
      - ./plugin:/app
    working_dir: /app

volumes:
  mysql-data:
  bridge-mysql-data:
